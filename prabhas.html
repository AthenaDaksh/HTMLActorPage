<para>
  Prabhas is an Indian actor who predominantly works in Telugu cinema and is widely hailed as the country's first "pan-Indian superstar." He rose to global prominence for his titular dual role in S.S. Rajamouli's epic Baahubali franchise, which broke numerous box-office records.
</para>
